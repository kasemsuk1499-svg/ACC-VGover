<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Vanguard Lab</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        color: #eef6ff;
        background:
          radial-gradient(circle at 15% 10%, rgba(255, 207, 90, .18), transparent 28%),
          radial-gradient(circle at 82% 12%, rgba(26, 215, 255, .14), transparent 26%),
          linear-gradient(135deg, #09111d, #171018 52%, #101820);
      }
      button, input, select {
        min-height: 40px;
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 8px;
        color: #fff;
        background: rgba(255,255,255,.08);
        font-weight: 700;
      }
      button { padding: 0 14px; cursor: pointer; }
      input, select { padding: 0 10px; width: 100%; }
      button:hover { background: rgba(255,255,255,.15); }
      button:disabled { opacity: .45; cursor: not-allowed; }
      .primary { background: linear-gradient(135deg, #f97316, #e11d48); border-color: #ffcf5a; }
      .app { display: grid; grid-template-columns: 272px 1fr; min-height: 100vh; }
      .side {
        padding: 20px;
        background: rgba(5,10,18,.76);
        border-right: 1px solid rgba(255,255,255,.12);
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .brand strong { display: block; font-size: 1.2rem; }
      .brand span, .muted { color: #aac2d7; font-size: .9rem; }
      .nav, .stack { display: grid; gap: 10px; }
      .nav button { text-align: left; }
      .content { padding: 22px; min-width: 0; }
      .top { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 16px; }
      h1, h2, h3, p { margin: 0; }
      .panel, .fighter, .arena, .stat {
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 8px;
        background: rgba(8,17,29,.8);
        box-shadow: 0 20px 70px rgba(0,0,0,.25);
      }
      .panel { padding: 18px; }
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; }
      .stat { padding: 12px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(182px, 1fr)); gap: 14px; }
      .card {
        overflow: hidden;
        border-radius: 8px;
        background: #101820;
        border: 1px solid rgba(255,255,255,.14);
        position: relative;
      }
      .card img { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; display: block; }
      .card .copy { padding: 10px; }
      .card strong { display: block; min-height: 40px; }
      .ssr, .sr { border-color: #ffcf5a; box-shadow: 0 0 0 1px rgba(255,207,90,.25); }
      .battle { display: grid; grid-template-rows: auto minmax(320px, 1fr) auto; gap: 14px; }
      .fighter { padding: 12px; }
      .fighter-head { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
      .field { display: grid; grid-template-columns: repeat(4, minmax(118px, 1fr)); gap: 10px; }
      .mini { padding: 8px; min-height: 172px; }
      .mini img { aspect-ratio: 4 / 3; border-radius: 6px; }
      .arena { display: grid; grid-template-columns: 280px 1fr; min-height: 330px; overflow: hidden; position: relative; }
      .turn { padding: 22px; display: grid; align-content: center; gap: 12px; background: rgba(255,207,90,.1); }
      .turn strong { font-size: 2rem; }
      .log { padding: 14px; max-height: 330px; overflow: auto; }
      .log p { padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,.08); color: #dcecff; }
      .fx {
        position: absolute;
        left: 48%;
        top: 42%;
        width: 220px;
        height: 18px;
        transform: rotate(-18deg);
        background: linear-gradient(90deg, transparent, #fff, #ffcf5a, transparent);
        animation: strike 1.3s infinite;
        pointer-events: none;
      }
      .fx.beam { background: linear-gradient(90deg, transparent, #63ffda, #fff, transparent); }
      .fx.shadow { background: linear-gradient(90deg, transparent, #a78bfa, #111827, transparent); }
      .fx.stage { background: linear-gradient(90deg, transparent, #ff76b8, #7bf1ff, transparent); }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0; }
      .deck-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,.08);
      }
      .room-box { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin: 14px 0; }
      .reveal-layer {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: rgba(4,8,14,.86);
        z-index: 10;
      }
      .reveal-layer.show { display: grid; }
      .reveal-card {
        width: min(340px, 80vw);
        border: 2px solid #ffcf5a;
        border-radius: 8px;
        overflow: hidden;
        background: #101820;
        animation: reveal .95s ease-out both;
      }
      .reveal-card img { width: 100%; display: block; }
      .toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        max-width: 360px;
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 8px;
        background: rgba(8,17,29,.96);
        padding: 12px;
        display: none;
        z-index: 11;
      }
      .toast.show { display: block; }
      @keyframes strike {
        0% { opacity: 0; transform: translateX(-80px) rotate(-18deg) scaleX(.3); }
        45% { opacity: 1; transform: translateX(80px) rotate(-18deg) scaleX(1.4); }
        100% { opacity: 0; transform: translateX(140px) rotate(-18deg) scaleX(.2); }
      }
      @keyframes reveal {
        0% { transform: rotateY(90deg) scale(.65); filter: brightness(.4); }
        55% { transform: rotateY(0deg) scale(1.08); filter: brightness(1.7); }
        100% { transform: rotateY(0deg) scale(1); filter: brightness(1); }
      }
      @media (max-width: 860px) {
        .app, .arena { grid-template-columns: 1fr; }
        .field { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
        .top, .fighter-head { flex-direction: column; align-items: stretch; }
        .room-box, .deck-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="side">
        <div class="brand">
          <strong>Anime Vanguard Lab</strong>
          <span>Firebase friend fight build</span>
        </div>
        <div class="nav">
          <button data-view="battle" class="primary">Battle</button>
          <button data-view="gacha">Gacha</button>
          <button data-view="deck">Deck</button>
          <button data-view="collection">Collection</button>
          <button data-view="lobby">Friend Lobby</button>
        </div>
        <div class="stack">
          <p class="muted">Account</p>
          <strong id="account-label">Not logged in</strong>
          <button id="login-button">Login with Firebase</button>
          <button id="save-button">Save Profile</button>
        </div>
        <div>
          <p class="muted">Collection</p>
          <strong id="owned-count">0 cards</strong>
        </div>
      </aside>

      <section class="content">
        <div class="top">
          <div>
            <h1 id="title">Battle</h1>
            <p class="muted">Game system is inside index.html. Card database is loaded from cards/index.js.</p>
          </div>
          <button class="primary" id="new-battle">New AI Fight</button>
        </div>
        <section id="screen"></section>
      </section>
    </main>

    <div class="reveal-layer" id="reveal-layer"></div>
    <div class="toast" id="toast"></div>

    <script type="module">
      import { cards, cardsById, starterDeckIds } from "./cards/index.js";
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
      import { getAuth, onAuthStateChanged, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
      import {
        doc,
        getDoc,
        getFirestore,
        onSnapshot,
        serverTimestamp,
        setDoc,
        updateDoc,
      } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBAAd_Sxn2Gyq6meBU9qQs-RaTMAQuq40E",
        authDomain: "anime-vg.firebaseapp.com",
        projectId: "anime-vg",
        storageBucket: "anime-vg.firebasestorage.app",
        messagingSenderId: "5444647133",
        appId: "1:5444647133:web:4a25e8a66c9603d15d0334",
        measurementId: "G-9L5JPYS1QD",
      };

      const app = initializeApp(firebaseConfig);
      try { getAnalytics(app); } catch {}
      const auth = getAuth(app);
      const db = getFirestore(app);

      const state = {
        view: "battle",
        user: null,
        ownedIds: loadLocal().ownedIds,
        deckIds: loadLocal().deckIds,
        pulls: [],
        battle: null,
        roomId: "",
        roomRole: "",
        unsubscribeRoom: null,
      };

      const screen = document.querySelector("#screen");
      const title = document.querySelector("#title");
      const ownedCount = document.querySelector("#owned-count");
      const accountLabel = document.querySelector("#account-label");
      const toast = document.querySelector("#toast");

      document.querySelectorAll("[data-view]").forEach((button) => {
        button.addEventListener("click", () => {
          state.view = button.dataset.view;
          render();
        });
      });
      document.querySelector("#login-button").addEventListener("click", toggleLogin);
      document.querySelector("#save-button").addEventListener("click", saveProfile);
      document.querySelector("#new-battle").addEventListener("click", () => {
        state.battle = createBattle("Player", state.deckIds, "ai");
        state.view = "battle";
        render();
      });

      onAuthStateChanged(auth, async (user) => {
        state.user = user;
        accountLabel.textContent = user ? `Guest ${user.uid.slice(0, 8)}` : "Not logged in";
        document.querySelector("#login-button").textContent = user ? "Logout" : "Login with Firebase";
        if (user) await loadProfile();
        render();
      });

      state.battle = createBattle("Player", state.deckIds, "ai");
      render();

      function render() {
        title.textContent = viewTitle(state.view);
        ownedCount.textContent = `${state.ownedIds.length} cards`;
        document.querySelectorAll("[data-view]").forEach((button) => {
          button.classList.toggle("primary", button.dataset.view === state.view);
        });
        if (state.view === "battle") renderBattle();
        if (state.view === "gacha") renderGacha();
        if (state.view === "deck") renderDeck();
        if (state.view === "collection") renderCollection();
        if (state.view === "lobby") renderLobby();
      }

      function renderBattle() {
        const battle = state.battle;
        const canPlayOnline = !battle.winner && (!state.roomId || battle.turnOwner === state.roomRole);
        screen.innerHTML = `
          <div class="stats">
            <div class="stat"><p class="muted">Mode</p><strong>${state.roomId ? `Online room ${state.roomId}` : "AI simulation"}</strong></div>
            <div class="stat"><p class="muted">Phase</p><strong>${battle.phase || "stand"}</strong></div>
            <div class="stat"><p class="muted">Turn owner</p><strong>${battle.turnOwner || battle.active}</strong></div>
          </div>
          <div class="battle">
            ${fighterHtml(battle.ai)}
            <section class="arena">
              <div class="turn">
                <span class="muted">${battle.active === "player" ? "Player turn" : "Opponent turn"}</span>
                <strong>${battle.winner ? (battle.winner === "player" ? "Player wins" : "Opponent wins") : `Turn ${battle.turn}`}</strong>
                <button class="primary" id="next-turn" ${canPlayOnline ? "" : "disabled"}>Resolve Turn</button>
                <button id="sync-room" ${state.roomId ? "" : "disabled"}>Sync Room</button>
              </div>
              <div class="fx ${battle.fx || battle.player.vanguard.attackAnimation || "slash"}"></div>
              <div class="log">${battle.log.slice(0, 16).map((line) => `<p>${escapeHtml(line)}</p>`).join("")}</div>
            </section>
            ${fighterHtml(battle.player)}
          </div>
        `;
        document.querySelector("#next-turn")?.addEventListener("click", async () => {
          state.battle = playTurn(state.battle);
          if (state.roomId) await syncRoomBattle();
          render();
        });
        document.querySelector("#sync-room")?.addEventListener("click", syncRoomBattle);
      }

      function renderGacha() {
        screen.innerHTML = `
          <section class="panel">
            <h2>Dimensional Banner</h2>
            <p class="muted">Pull cards, play reveal animations, and save the collection to Firebase.</p>
            <div class="actions">
              <button id="pull-one">Pull 1</button>
              <button class="primary" id="pull-ten">Pull 10</button>
            </div>
            <div class="grid">${(state.pulls.length ? state.pulls : cards.slice(0, 6)).map(cardHtml).join("")}</div>
          </section>
        `;
        document.querySelector("#pull-one").addEventListener("click", () => pull(1));
        document.querySelector("#pull-ten").addEventListener("click", () => pull(10));
      }

      function renderDeck() {
        const counts = countIds(state.deckIds);
        const ownedCounts = countIds(state.ownedIds);
        screen.innerHTML = `
          <section class="panel">
            <h2>Deck Builder</h2>
            <p class="muted">Target deck size is 40. The battle engine pads starter cards if the deck is short.</p>
            <div class="actions">
              <button id="starter-deck">Use Starter Deck</button>
              <button class="primary" id="save-deck">Save Deck</button>
            </div>
            <div class="stats">
              <div class="stat"><p class="muted">Deck size</p><strong>${state.deckIds.length}/40</strong></div>
              <div class="stat"><p class="muted">Grade 0</p><strong>${gradeCount(state.deckIds, 0)}</strong></div>
              <div class="stat"><p class="muted">Grade 1</p><strong>${gradeCount(state.deckIds, 1)}</strong></div>
              <div class="stat"><p class="muted">Grade 2</p><strong>${gradeCount(state.deckIds, 2)}</strong></div>
              <div class="stat"><p class="muted">Grade 3</p><strong>${gradeCount(state.deckIds, 3)}</strong></div>
            </div>
            ${cards.map((card) => `
              <div class="deck-row">
                <div>
                  <strong>${card.name}</strong>
                  <p class="muted">${card.nation} · G${card.grade} · owned ${ownedCounts[card.id] || 0} · in deck ${counts[card.id] || 0}</p>
                </div>
                <button data-remove="${card.id}" ${(counts[card.id] || 0) <= 0 ? "disabled" : ""}>-</button>
                <button data-add="${card.id}" ${state.deckIds.length >= 40 || (counts[card.id] || 0) >= (ownedCounts[card.id] || 0) ? "disabled" : ""}>+</button>
              </div>
            `).join("")}
          </section>
        `;
        document.querySelector("#starter-deck").addEventListener("click", () => {
          state.deckIds = [...starterDeckIds];
          saveProfile();
          render();
        });
        document.querySelector("#save-deck").addEventListener("click", saveProfile);
        document.querySelectorAll("[data-add]").forEach((button) => button.addEventListener("click", () => {
          state.deckIds.push(button.dataset.add);
          renderDeck();
        }));
        document.querySelectorAll("[data-remove]").forEach((button) => button.addEventListener("click", () => {
          const index = state.deckIds.indexOf(button.dataset.remove);
          if (index >= 0) state.deckIds.splice(index, 1);
          renderDeck();
        }));
      }

      function renderCollection() {
        const ownedCards = state.ownedIds.map((id) => cardsById.get(id)).filter(Boolean);
        screen.innerHTML = `
          <section class="panel">
            <h2>Collection</h2>
            <p class="muted">All card data comes from cards/index.js.</p>
            <div class="grid">${ownedCards.map(cardHtml).join("")}</div>
          </section>
        `;
      }

      function renderLobby() {
        screen.innerHTML = `
          <section class="panel">
            <h2>Friend Lobby</h2>
            <p class="muted">Login first. Create a room, send the room code to a friend, then both players can sync turns through Firestore.</p>
            <div class="actions">
              <button class="primary" id="create-room" ${state.user ? "" : "disabled"}>Create Room</button>
            </div>
            <div class="room-box">
              <input id="room-input" placeholder="Room code" value="${state.roomId}">
              <button id="join-room" ${state.user ? "" : "disabled"}>Join Room</button>
            </div>
            <div class="stats">
              <div class="stat"><p class="muted">Current room</p><strong>${state.roomId || "None"}</strong></div>
              <div class="stat"><p class="muted">Role</p><strong>${state.roomRole || "None"}</strong></div>
            </div>
          </section>
        `;
        document.querySelector("#create-room").addEventListener("click", createRoom);
        document.querySelector("#join-room").addEventListener("click", () => joinRoom(document.querySelector("#room-input").value.trim()));
      }

      function cardHtml(card) {
        return `
          <article class="card ${card.rarity.toLowerCase()}">
            <img src="${card.art}" alt="${card.name}">
            <div class="copy">
              <span class="muted">${card.nation} · G${card.grade} · ${card.rarity}</span>
              <strong>${card.name}</strong>
              <p class="muted">${card.skills[0]?.name || "No skill"}</p>
            </div>
          </article>
        `;
      }

      function fighterHtml(fighter) {
        return `
          <section class="fighter">
            <div class="fighter-head">
              <strong>${fighter.name}</strong>
              <span class="muted">Damage ${fighter.damage.length}/6 · Hand ${fighter.hand.length} · Deck ${fighter.deck.length} · Soul ${fighter.soul.length}</span>
            </div>
            <div class="field">
              ${miniHtml(fighter.vanguard, "Vanguard")}
              ${fighter.rearGuards.map((card) => miniHtml(card, "Rear-guard")).join("")}
            </div>
          </section>
        `;
      }

      function miniHtml(card, label) {
        return `
          <article class="card mini">
            <img src="${card.art}" alt="${card.name}">
            <div class="copy">
              <span class="muted">${label}</span>
              <strong>${card.name}</strong>
              <p class="muted">G${card.grade} / ${card.power}</p>
            </div>
          </article>
        `;
      }

      async function toggleLogin() {
        if (state.user) {
          await signOut(auth);
          showToast("Logged out.");
          return;
        }
        await signInAnonymously(auth);
        showToast("Firebase login ready.");
      }

      async function loadProfile() {
        const ref = doc(db, "players", state.user.uid);
        const snapshot = await getDoc(ref);
        if (snapshot.exists()) {
          const data = snapshot.data();
          state.ownedIds = Array.isArray(data.ownedIds) ? data.ownedIds : state.ownedIds;
          state.deckIds = Array.isArray(data.deckIds) ? data.deckIds : state.deckIds;
          saveLocal();
          showToast("Profile loaded from Firebase.");
        } else {
          await saveProfile();
        }
      }

      async function saveProfile() {
        saveLocal();
        if (!state.user) {
          showToast("Saved locally. Login to sync Firebase.");
          return;
        }
        await setDoc(doc(db, "players", state.user.uid), {
          ownedIds: state.ownedIds,
          deckIds: state.deckIds,
          updatedAt: serverTimestamp(),
        }, { merge: true });
        showToast("Saved to Firebase.");
      }

      async function createRoom() {
        if (!state.user) return showToast("Login first.");
        const roomId = Math.random().toString(36).slice(2, 8).toUpperCase();
        const battle = createBattle("Host", state.deckIds, "guest");
        state.roomId = roomId;
        state.roomRole = "player";
        state.battle = battle;
        await setDoc(doc(db, "rooms", roomId), {
          hostUid: state.user.uid,
          guestUid: "",
          ready: { host: true, guest: false },
          battleSnapshot: battle,
          turnOwner: "player",
          updatedAt: serverTimestamp(),
        });
        watchRoom(roomId);
        state.view = "lobby";
        render();
        showToast(`Room created: ${roomId}`);
      }

      async function joinRoom(roomId) {
        if (!state.user) return showToast("Login first.");
        if (!roomId) return showToast("Enter a room code.");
        const ref = doc(db, "rooms", roomId);
        const snapshot = await getDoc(ref);
        if (!snapshot.exists()) return showToast("Room not found.");
        const room = snapshot.data();
        if (room.hostUid === state.user.uid) {
          state.roomRole = "player";
        } else {
          await updateDoc(ref, {
            guestUid: state.user.uid,
            "ready.guest": true,
            updatedAt: serverTimestamp(),
          });
          state.roomRole = "ai";
        }
        state.roomId = roomId;
        watchRoom(roomId);
        state.view = "battle";
        render();
        showToast(`Joined room: ${roomId}`);
      }

      function watchRoom(roomId) {
        if (state.unsubscribeRoom) state.unsubscribeRoom();
        state.unsubscribeRoom = onSnapshot(doc(db, "rooms", roomId), (snapshot) => {
          if (!snapshot.exists()) return;
          const room = snapshot.data();
          if (room.battleSnapshot) state.battle = room.battleSnapshot;
          render();
        });
      }

      async function syncRoomBattle() {
        if (!state.user || !state.roomId) return;
        state.battle.turnOwner = state.battle.active;
        await updateDoc(doc(db, "rooms", state.roomId), {
          battleSnapshot: state.battle,
          turnOwner: state.battle.turnOwner,
          updatedAt: serverTimestamp(),
        });
        showToast("Room synced.");
      }

      async function pull(amount) {
        state.pulls = pullGacha(amount);
        state.ownedIds.push(...state.pulls.map((card) => card.id));
        await revealPulls(state.pulls);
        await saveProfile();
        render();
      }

      function pullGacha(amount) {
        const pool = cards.flatMap((card) => {
          const weight = card.rarity === "SSR" ? 1 : card.rarity === "SR" ? 3 : card.rarity === "RR" ? 7 : card.rarity === "R" ? 14 : 24;
          return Array.from({ length: weight }, () => card);
        });
        return Array.from({ length: amount }, () => pool[Math.floor(Math.random() * pool.length)]);
      }

      async function revealPulls(pulls) {
        const layer = document.querySelector("#reveal-layer");
        for (const card of pulls.filter((item) => item.rarity === "SSR" || item.rarity === "SR").slice(0, 3)) {
          layer.innerHTML = `
            <article class="reveal-card">
              <img src="${card.art}" alt="${card.name}">
              <div class="copy">
                <p class="muted">${card.rarity} reveal</p>
                <h2>${card.name}</h2>
              </div>
            </article>
          `;
          layer.classList.add("show");
          await wait(950);
          layer.classList.remove("show");
          await wait(180);
        }
      }

      function createBattle(playerName, deckIds, opponentName) {
        const playerDeck = buildDeck(deckIds.length >= 10 ? deckIds : starterDeckIds);
        const aiDeck = buildDeck([...starterDeckIds].reverse());
        return {
          turn: 1,
          active: "player",
          turnOwner: "player",
          phase: "stand",
          player: createFighter(playerName, playerDeck),
          ai: createFighter(opponentName === "guest" ? "Guest" : "AI Rival", aiDeck),
          log: ["Stand up. Vanguard!"],
          fx: "slash",
        };
      }

      function createFighter(name, deck) {
        const vanguard = takeFirstGradeZero(deck);
        return {
          name,
          deck,
          hand: draw(deck, 5),
          damage: [],
          drop: [],
          soul: [],
          rearGuards: [],
          vanguard,
          rideGrade: 0,
          powerBonus: 0,
          criticalBonus: 0,
          counterBlast: 0,
        };
      }

      function playTurn(input) {
        if (input.winner) return input;
        const battle = cloneBattle(input);
        const actor = battle.active === "player" ? battle.player : battle.ai;
        const defender = battle.active === "player" ? battle.ai : battle.player;
        actor.powerBonus = 0;
        actor.criticalBonus = 0;
        battle.phase = "stand/draw";
        battle.log.unshift(`Turn ${battle.turn}: ${actor.name}'s turn.`);
        actor.hand.push(...draw(actor.deck, 1));
        battle.log.unshift(`${actor.name} draws for turn.`);
        battle.phase = "ride";
        ride(actor, battle.log);
        battle.phase = "main";
        callRearGuards(actor, battle.log);
        battle.phase = "battle";
        attackWithVanguard(actor, defender, battle);
        for (const rear of actor.rearGuards.slice(0, 2)) {
          resolveAttack(actor, defender, rear, battle);
          checkWinner(battle);
          if (battle.winner) break;
        }
        battle.phase = "end";
        checkWinner(battle);
        battle.active = battle.active === "player" ? "ai" : "player";
        battle.turnOwner = battle.active;
        battle.turn += battle.active === "player" ? 1 : 0;
        return battle;
      }

      function ride(actor, log) {
        const nextGrade = Math.min(actor.rideGrade + 1, 3);
        const index = actor.hand.findIndex((card) => card.grade === nextGrade);
        if (index < 0) {
          log.unshift(`${actor.name} skips ride.`);
          return;
        }
        const [next] = actor.hand.splice(index, 1);
        actor.soul.push(actor.vanguard);
        actor.vanguard = next;
        actor.rideGrade = nextGrade;
        log.unshift(`${actor.name} rides ${next.name}.`);
        applySkills(actor, next, "onRide", log);
      }

      function callRearGuards(actor, log) {
        while (actor.rearGuards.length < 3) {
          const index = actor.hand.findIndex((card) => card.grade <= actor.rideGrade && card.grade > 0);
          if (index < 0) return;
          const [called] = actor.hand.splice(index, 1);
          actor.rearGuards.push(called);
          log.unshift(`${actor.name} calls ${called.name}.`);
          applySkills(actor, called, "onCall", log);
        }
      }

      function attackWithVanguard(actor, defender, battle) {
        applySkills(actor, actor.vanguard, "attack", battle.log);
        battle.fx = actor.vanguard.attackAnimation || "slash";
        resolveAttack(actor, defender, actor.vanguard, battle);
        const checks = actor.rideGrade >= 3 ? 2 : 1;
        for (let i = 0; i < checks; i += 1) {
          const checked = draw(actor.deck, 1)[0];
          if (!checked) continue;
          actor.hand.push(checked);
          battle.log.unshift(`${actor.name} drive checks ${checked.name}${checked.trigger ? ` (${checked.trigger})` : ""}.`);
          if (checked.trigger) resolveTrigger(actor, defender, checked.trigger, battle.log);
        }
      }

      function resolveAttack(actor, defender, attacker, battle) {
        battle.fx = attacker.attackAnimation || battle.fx || "slash";
        const guard = chooseGuard(defender, attacker.power + actor.powerBonus);
        const attackPower = attacker.power + actor.powerBonus;
        const defensePower = defender.vanguard.power + guard.shield;
        if (guard.card) battle.log.unshift(`${defender.name} guards with ${guard.card.name} for ${guard.shield} shield.`);
        if (attackPower >= defensePower) {
          const critical = attacker.critical + actor.criticalBonus;
          battle.log.unshift(`${attacker.name} hits for ${critical} damage.`);
          for (let i = 0; i < critical; i += 1) damageCheck(defender, actor, battle.log);
        } else {
          battle.log.unshift(`${attacker.name} attacks, but ${defender.name} defends.`);
        }
        actor.powerBonus = 0;
        actor.criticalBonus = 0;
      }

      function chooseGuard(defender, incomingPower) {
        const needed = Math.max(0, incomingPower - defender.vanguard.power + 1000);
        if (needed <= 0 || defender.hand.length < 2) return { shield: 0 };
        const index = defender.hand.findIndex((card) => card.shield >= needed || card.shield >= 10000);
        if (index < 0) return { shield: 0 };
        const [card] = defender.hand.splice(index, 1);
        defender.drop.push(card);
        const skill = card.skills.find((item) => item.engineEffect === "guardBoost");
        return { card, shield: card.shield + (skill?.amount || 0) };
      }

      function damageCheck(defender, attacker, log) {
        const damage = draw(defender.deck, 1)[0];
        if (!damage) return;
        defender.damage.push(damage);
        defender.counterBlast = defender.damage.length;
        log.unshift(`${defender.name} damage checks ${damage.name}${damage.trigger ? ` (${damage.trigger})` : ""}.`);
        if (damage.trigger) resolveTrigger(defender, attacker, damage.trigger, log);
      }

      function resolveTrigger(owner, opponent, trigger, log) {
        owner.powerBonus += trigger === "over" ? 100000000 : 10000;
        if (trigger === "critical") owner.criticalBonus += 1;
        if (trigger === "draw") owner.hand.push(...draw(owner.deck, 1));
        if (trigger === "front") owner.powerBonus += 5000;
        if (trigger === "heal" && owner.damage.length >= opponent.damage.length && owner.damage.length > 0) {
          owner.drop.push(owner.damage.pop());
          log.unshift(`${owner.name} heals 1 damage.`);
        }
      }

      function applySkills(actor, card, timing, log) {
        card.skills.filter((skill) => skill.timing === timing).forEach((skill) => {
          if (skill.engineEffect === "gainPower") actor.powerBonus += skill.amount || 0;
          if (skill.engineEffect === "draw") actor.hand.push(...draw(actor.deck, skill.amount || 1));
          if (skill.engineEffect === "soulCharge") actor.soul.push(...draw(actor.deck, skill.amount || 1));
          if (skill.engineEffect === "extraCritical") {
            actor.powerBonus += 10000;
            actor.criticalBonus += skill.amount || 1;
          }
          log.unshift(`${card.name}: ${skill.name}.`);
        });
      }

      function buildDeck(ids) {
        const expanded = [...ids];
        while (expanded.length < 40) expanded.push(starterDeckIds[expanded.length % starterDeckIds.length]);
        return shuffle(expanded.map((id) => cardsById.get(id) || cards[0]));
      }

      function draw(deck, amount) { return deck.splice(0, amount); }
      function takeFirstGradeZero(deck) {
        const index = deck.findIndex((card) => card.grade === 0);
        return deck.splice(index >= 0 ? index : 0, 1)[0] || cards[0];
      }
      function shuffle(items) {
        return items.map((item) => ({ item, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ item }) => item);
      }
      function checkWinner(battle) {
        if (battle.player.damage.length >= 6) battle.winner = "ai";
        if (battle.ai.damage.length >= 6) battle.winner = "player";
      }
      function cloneBattle(battle) {
        return { ...battle, player: cloneFighter(battle.player), ai: cloneFighter(battle.ai), log: [...battle.log] };
      }
      function cloneFighter(fighter) {
        return {
          ...fighter,
          deck: [...fighter.deck],
          hand: [...fighter.hand],
          damage: [...fighter.damage],
          drop: [...fighter.drop],
          soul: [...fighter.soul],
          rearGuards: [...fighter.rearGuards],
        };
      }
      function countIds(ids) {
        return ids.reduce((map, id) => {
          map[id] = (map[id] || 0) + 1;
          return map;
        }, {});
      }
      function gradeCount(ids, grade) {
        return ids.map((id) => cardsById.get(id)).filter((card) => card?.grade === grade).length;
      }
      function saveLocal() {
        localStorage.setItem("plain-anime-vg", JSON.stringify({ ownedIds: state.ownedIds, deckIds: state.deckIds }));
      }
      function loadLocal() {
        const fallback = { ownedIds: [...starterDeckIds], deckIds: [...starterDeckIds] };
        const saved = localStorage.getItem("plain-anime-vg");
        if (!saved) return fallback;
        try {
          const data = JSON.parse(saved);
          return {
            ownedIds: Array.isArray(data.ownedIds) ? data.ownedIds : fallback.ownedIds,
            deckIds: Array.isArray(data.deckIds) ? data.deckIds : fallback.deckIds,
          };
        } catch {
          return fallback;
        }
      }
      function wait(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2600);
      }
      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[char]);
      }
      function viewTitle(view) {
        return { battle: "Battle", gacha: "Gacha", deck: "Deck Builder", collection: "Collection", lobby: "Friend Lobby" }[view];
      }
    </script>
  </body>
</html>
